name: oh-my-workspace
services:
  omw:
    image: centos:7
    platform: linux/amd64
    working_dir: /workspace
    environment:
      BASH_ENV: /etc/profile.d/modules.sh
      OMW_NO_SPINNER: "1"
    volumes:
      - .:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail

        sed -i \
          -e 's|^mirrorlist=|#mirrorlist=|g' \
          -e 's|^#baseurl=http://mirror.centos.org/centos/$$releasever|baseurl=http://vault.centos.org/7.9.2009|g' \
          /etc/yum.repos.d/CentOS-Base.repo

        rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7 || true
        yum clean all
        yum -y makecache
        yum -y install epel-release
        yum -y groupinstall "Development Tools"
        # Add curl and jq for the release step
        yum -y install git which findutils coreutils wget tar make gcc gcc-c++ unzip cpio yum-utils environment-modules xz-devel bzip2 python3 rpm2cpio ncurses-devel curl jq perl-ExtUtils-ParseXS

        # BASH_ENV makes future docker compose exec Bash commands load module;
        # source it here because this shell started before the package existed.
        source /etc/profile.d/modules.sh

        bash -n omw
        bash -n packages.sh
        bash -n env.sh
        type module
        ./omw --help >/dev/null

        echo "OMW CentOS 7 x86 test container is ready."
        echo "Try: docker compose exec centos7-x86 ./omw --verify-offline"
        tail -f /dev/null
