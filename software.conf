#!/bin/bash
# OMW (Oh My Workspace) Configuration File

# =============================================================================
# Section 1: Source Code Builds
# =============================================================================
# List of all software to be managed.
declare -rg SOFTWARE_LIST=(
	"openssl"
	"ncurses"
	"lua"
	"local"
	"libevent"
	"gcc"
	"python"
	"tmux"
	"zsh"
	"vim"
	"ctags"
)

# Declare associative arrays for software properties.
declare -gA SOFTWARE_VERSIONS SOFTWARE_URLS SOFTWARE_DEPS SOFTWARE_CONFIG_CMDS SOFTWARE_CFLAGS SOFTWARE_LDFLAGS

# --- Definitions for Source Builds ---
# IMPORTANT:
# - SOFTWARE_VERSIONS: Space-separated list of versions.
# - SOFTWARE_URLS: Use {VERSION} as a placeholder for the version number.
# - SOFTWARE_DEPS: Use 'name@version' format. The key must also be 'name@version'.

SOFTWARE_VERSIONS["openssl"]="1.1.1w"
SOFTWARE_URLS["openssl"]="https://www.openssl.org/source/openssl-{VERSION}.tar.gz"
SOFTWARE_DEPS["openssl@1.1.1w"]=""
SOFTWARE_CONFIG_CMDS["openssl"]="./config --prefix=\$prefix --openssldir=\$prefix"
SOFTWARE_CFLAGS["openssl"]='-I$prefix/include'
SOFTWARE_LDFLAGS["openssl"]='-L$prefix/lib -lssl -lcrypto'

SOFTWARE_VERSIONS["ncurses"]="6.5"
SOFTWARE_URLS["ncurses"]="https://ftp.gnu.org/gnu/ncurses/ncurses-{VERSION}.tar.gz"
SOFTWARE_DEPS["ncurses@6.5"]=""
SOFTWARE_CONFIG_CMDS["ncurses"]="special"
SOFTWARE_CFLAGS["ncurses"]='-I$prefix/include'
SOFTWARE_LDFLAGS["ncurses"]='-L$prefix/lib -lncursesw -ltinfow'

SOFTWARE_VERSIONS["lua"]="5.4.7"
SOFTWARE_URLS["lua"]="https://www.lua.org/ftp/lua-{VERSION}.tar.gz"
SOFTWARE_DEPS["lua@5.4.7"]=""
SOFTWARE_CONFIG_CMDS["lua"]="special"

SOFTWARE_VERSIONS["local"]="1.0.0"
# 'local' is a special target, no URL needed.
SOFTWARE_URLS["local"]=""
SOFTWARE_DEPS["local@1.0.0"]=""
SOFTWARE_CONFIG_CMDS["local"]="special"
SOFTWARE_CFLAGS["local"]='-I$prefix/include -I/usr/include'
SOFTWARE_LDFLAGS["local"]='-L$prefix/lib -L/usr/lib64 -lffi -ltcl8.5 -ltk8.5'

SOFTWARE_VERSIONS["libevent"]="2.1.12"
SOFTWARE_URLS["libevent"]="https://github.com/libevent/libevent/releases/download/release-{VERSION}-stable/libevent-{VERSION}-stable.tar.gz"
SOFTWARE_DEPS["libevent@2.1.12"]="openssl@1.1.1w"
SOFTWARE_CONFIG_CMDS["libevent"]="./configure --prefix=\$prefix --enable-shared"

# SOFTWARE_VERSIONS["gcc"]="13.2.0"
# SOFTWARE_URLS["gcc"]="https://ftp.gnu.org/gnu/gcc/gcc-{VERSION}/gcc-{VERSION}.tar.gz"
# SOFTWARE_DEPS["gcc@13.2.0"]=""
# SOFTWARE_CONFIG_CMDS["gcc"]="special"

SOFTWARE_VERSIONS["python"]="3.9.24 3.11.9 3.12.13 3.13.8 3.14.0"
SOFTWARE_URLS["python"]="https://www.python.org/ftp/python/{VERSION}/Python-{VERSION}.tgz"
SOFTWARE_DEPS["python@3.9.24"]="openssl@1.1.1w local@1.0.0"
SOFTWARE_DEPS["python@3.11.9"]="openssl@1.1.1w local@1.0.0"
SOFTWARE_DEPS["python@3.12.13"]="openssl@1.1.1w local@1.0.0"
SOFTWARE_DEPS["python@3.13.8"]="openssl@1.1.1w local@1.0.0"
SOFTWARE_DEPS["python@3.14.0"]="openssl@1.1.1w local@1.0.0"
SOFTWARE_CONFIG_CMDS["python"]="./configure --prefix=\$prefix --with-openssl=\${SOFTWARE_INSTALL_PATH}/openssl/openssl-1.1.1w --with-system-ffi --with-ensurepip=install"

SOFTWARE_VERSIONS["tmux"]="3.5a"
SOFTWARE_URLS["tmux"]="https://github.com/tmux/tmux/releases/download/{VERSION}/tmux-{VERSION}.tar.gz"
SOFTWARE_DEPS["tmux@3.5a"]="ncurses@6.5 libevent@2.1.12"
SOFTWARE_CONFIG_CMDS["tmux"]="./configure --prefix=\$prefix"

SOFTWARE_VERSIONS["zsh"]="5.9"
SOFTWARE_URLS["zsh"]="https://sourceforge.net/projects/zsh/files/zsh/{VERSION}/zsh-{VERSION}.tar.xz"
SOFTWARE_DEPS["zsh@5.9"]="ncurses@6.5"
SOFTWARE_CONFIG_CMDS["zsh"]="./configure --prefix=\$prefix --enable-multibyte --enable-pcre --enable-zsh-mem --enable-zsh-debug --with-tcsetpgrp"

SOFTWARE_VERSIONS["vim"]="9.1.1857"
SOFTWARE_URLS["vim"]="https://github.com/vim/vim/archive/refs/tags/v{VERSION}.tar.gz"
SOFTWARE_DEPS["vim@9.1.1857"]="ncurses@6.5 lua@5.4.7 local@1.0.0 python@3.12.13"
SOFTWARE_CONFIG_CMDS["vim"]="special"

SOFTWARE_VERSIONS["ctags"]="6.2.0"
SOFTWARE_URLS["ctags"]="https://github.com/universal-ctags/ctags/releases/download/v{VERSION}/universal-ctags-{VERSION}.tar.gz"
SOFTWARE_DEPS["ctags@6.2.0"]=""
SOFTWARE_CONFIG_CMDS["ctags"]="special"

# =============================================================================
# Section 2: Pre-compiled Apps
# =============================================================================
declare -rg APP_LIST=("exa" "rg" "fzf" "yazi" "fd" "autojump")
declare -gA APP_VERSIONS APP_URLS APP_EXECUTABLE_NAME

APP_VERSIONS["exa"]="0.10.1"
APP_URLS["exa"]="https://github.com/ogham/exa/releases/download/v${APP_VERSIONS[exa]}/exa-linux-x86_64-musl-v${APP_VERSIONS[exa]}.zip"
APP_EXECUTABLE_NAME["exa"]="exa"

APP_VERSIONS["rg"]="14.1.0"
APP_URLS["rg"]="https://github.com/BurntSushi/ripgrep/releases/download/${APP_VERSIONS[rg]}/ripgrep-${APP_VERSIONS[rg]}-x86_64-unknown-linux-musl.tar.gz"
APP_EXECUTABLE_NAME["rg"]="rg"

APP_VERSIONS["fzf"]="0.65.2"
APP_URLS["fzf"]="https://github.com/junegunn/fzf/releases/download/v${APP_VERSIONS[fzf]}/fzf-${APP_VERSIONS[fzf]}-linux_amd64.tar.gz"
APP_EXECUTABLE_NAME["fzf"]="fzf"

APP_VERSIONS["yazi"]="25.5.31"
APP_URLS["yazi"]="https://github.com/sxyazi/yazi/releases/download/v${APP_VERSIONS[yazi]}/yazi-x86_64-unknown-linux-musl.zip"
APP_EXECUTABLE_NAME["yazi"]="yazi"

APP_VERSIONS["fd"]="10.3.0"
APP_URLS["fd"]="https://github.com/sharkdp/fd/releases/download/v${APP_VERSIONS[fd]}/fd-v${APP_VERSIONS[fd]}-aarch64-unknown-linux-musl.tar.gz"
APP_EXECUTABLE_NAME["fd"]="fd"

APP_VERSIONS["autojump"]="22.5.3"
APP_URLS["autojump"]="https://github.com/wting/autojump/archive/refs/tags/release-v${APP_VERSIONS[autojump]}.zip"
APP_EXECUTABLE_NAME["autojump"]="special"