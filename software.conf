#!/bin/bash
# OMW (Oh My Workspace) Configuration File

# =============================================================================
# Section 1: Source Code Builds
# =============================================================================
declare -rg SOFTWARE_LIST=(
	"openssl"
	"ncurses"
	"lua"
	"local"
	"libevent"
	"gcc"
	"python"
	"tmux"
	"zsh"
	"vim"
)

declare -gA SOFTWARE_VERSIONS SOFTWARE_URLS SOFTWARE_DEPS SOFTWARE_CONFIG_CMDS SOFTWARE_CFLAGS SOFTWARE_LDFLAGS

# --- Definitions for Source Builds ---

SOFTWARE_VERSIONS["openssl"]="1.1.1w"
SOFTWARE_URLS["openssl"]="https://www.openssl.org/source/openssl-${SOFTWARE_VERSIONS[openssl]}.tar.gz"
SOFTWARE_DEPS["openssl"]=""
SOFTWARE_CONFIG_CMDS["openssl"]="./config --prefix=\$prefix --openssldir=\$prefix"
# Custom flags for easy linking against this openssl
SOFTWARE_CFLAGS["openssl"]='-I$prefix/include'
SOFTWARE_LDFLAGS["openssl"]='-L$prefix/lib -lssl -lcrypto'

SOFTWARE_VERSIONS["ncurses"]="6.5"
SOFTWARE_URLS["ncurses"]="https://ftp.gnu.org/gnu/ncurses/ncurses-${SOFTWARE_VERSIONS[ncurses]}.tar.gz"
SOFTWARE_DEPS["ncurses"]=""
SOFTWARE_CONFIG_CMDS["ncurses"]="special"
# Custom flags to link against both normal and wide-character libraries
SOFTWARE_CFLAGS["ncurses"]='-I$prefix/include'
SOFTWARE_LDFLAGS["ncurses"]='-L$prefix/lib -lncursesw -ltinfow'

SOFTWARE_VERSIONS["lua"]="5.4.7"
SOFTWARE_URLS["lua"]="https://www.lua.org/ftp/lua-${SOFTWARE_VERSIONS[lua]}.tar.gz"
SOFTWARE_DEPS["lua"]=""
SOFTWARE_CONFIG_CMDS["lua"]="special"
SOFTWARE_CFLAGS["lua"]="" # No special flags needed
SOFTWARE_LDFLAGS["lua"]="" # No special flags needed

SOFTWARE_VERSIONS["local"]="1.0.0"
SOFTWARE_URLS["local"]=""
SOFTWARE_DEPS["local"]=""
SOFTWARE_CONFIG_CMDS["local"]="special"
# Custom flags to ensure system libraries like libffi are found
SOFTWARE_CFLAGS["local"]='-I$prefix/include -I/usr/include'
SOFTWARE_LDFLAGS["local"]='-L$prefix/lib -L/usr/lib64 -lffi -ltcl8.5 -ltk8.5'

SOFTWARE_VERSIONS["libevent"]="2.1.12"
SOFTWARE_URLS["libevent"]="https://github.com/libevent/libevent/releases/download/release-${SOFTWARE_VERSIONS[libevent]}-stable/libevent-${SOFTWARE_VERSIONS[libevent]}-stable.tar.gz"
SOFTWARE_DEPS["libevent"]="openssl"
SOFTWARE_CONFIG_CMDS["libevent"]="./configure --prefix=\$prefix --enable-shared"
SOFTWARE_CFLAGS["libevent"]=""
SOFTWARE_LDFLAGS["libevent"]=""

# SOFTWARE_VERSIONS["gcc"]="13.2.0"
# SOFTWARE_URLS["gcc"]="https://ftp.gnu.org/gnu/gcc/gcc-${SOFTWARE_VERSIONS[gcc]}/gcc-${SOFTWARE_VERSIONS[gcc]}.tar.gz"
# SOFTWARE_DEPS["gcc"]="local"
# SOFTWARE_CONFIG_CMDS["gcc"]="special"
# SOFTWARE_CFLAGS["gcc"]=""
# SOFTWARE_LDFLAGS["gcc"]=""

SOFTWARE_VERSIONS["python"]="3.11.12"
SOFTWARE_URLS["python"]="https://www.python.org/ftp/python/${SOFTWARE_VERSIONS[python]}/Python-${SOFTWARE_VERSIONS[python]}.tgz"
SOFTWARE_DEPS["python"]="openssl local"
SOFTWARE_CONFIG_CMDS["python"]="./configure --prefix=\$prefix --with-openssl=\${SOFTWARE_INSTALL_PATH}/openssl/openssl-${SOFTWARE_VERSIONS[openssl]} --with-system-ffi --with-ensurepip=install"
SOFTWARE_CFLAGS["python"]=""
SOFTWARE_LDFLAGS["python"]=""

SOFTWARE_VERSIONS["tmux"]="3.5a"
SOFTWARE_URLS["tmux"]="https://github.com/tmux/tmux/releases/download/${SOFTWARE_VERSIONS[tmux]}/tmux-${SOFTWARE_VERSIONS[tmux]}.tar.gz"
SOFTWARE_DEPS["tmux"]="ncurses libevent"
SOFTWARE_CONFIG_CMDS["tmux"]="./configure --prefix=\$prefix"
SOFTWARE_CFLAGS["tmux"]=""
SOFTWARE_LDFLAGS["tmux"]=""

SOFTWARE_VERSIONS["zsh"]="5.9"
SOFTWARE_URLS["zsh"]="https://sourceforge.net/projects/zsh/files/zsh/${SOFTWARE_VERSIONS[zsh]}/zsh-${SOFTWARE_VERSIONS[zsh]}.tar.xz"
SOFTWARE_DEPS["zsh"]="ncurses"
SOFTWARE_CONFIG_CMDS["zsh"]="./configure --prefix=\$prefix --enable-multibyte --enable-pcre"
SOFTWARE_CFLAGS["zsh"]=""
SOFTWARE_LDFLAGS["zsh"]=""

SOFTWARE_VERSIONS["vim"]="9.1.1846"
SOFTWARE_URLS["vim"]="https://github.com/vim/vim/archive/refs/tags/v${SOFTWARE_VERSIONS[vim]}.tar.gz"
SOFTWARE_DEPS["vim"]="ncurses lua local python"
SOFTWARE_CONFIG_CMDS["vim"]="special"
SOFTWARE_CFLAGS["vim"]=""
SOFTWARE_LDFLAGS["vim"]=""

SOFTWARE_VERSIONS["ctags"]="6.2.0" # Added for ctags pre-compiled app
SOFTWARE_URLS["ctags"]="https://github.com/universal-ctags/ctags/releases/download/v${SOFTWARE_VERSIONS[ctags]}/universal-ctags-${SOFTWARE_VERSIONS[ctags]}.tar.gz"
SOFTWARE_DEPS["ctags"]=""
SOFTWARE_CONFIG_CMDS["ctags"]="special"
SOFTWARE_CFLAGS["ctags"]=""
SOFTWARE_LDFLAGS["ctags"]=""

# =============================================================================
# Section 2: Pre-compiled Apps
# =============================================================================
declare -rg APP_LIST=("exa" "rg" "fzf" "yazi" "fd" "autojump")
declare -gA APP_VERSIONS APP_URLS APP_EXECUTABLE_NAME

APP_VERSIONS["exa"]="0.10.1"
APP_URLS["exa"]="https://github.com/ogham/exa/releases/download/v${APP_VERSIONS[exa]}/exa-linux-x86_64-musl-v${APP_VERSIONS[exa]}.zip"
APP_EXECUTABLE_NAME["exa"]="exa"

APP_VERSIONS["rg"]="14.1.0"
APP_URLS["rg"]="https://github.com/BurntSushi/ripgrep/releases/download/${APP_VERSIONS[rg]}/ripgrep-${APP_VERSIONS[rg]}-x86_64-unknown-linux-musl.tar.gz"
APP_EXECUTABLE_NAME["rg"]="rg"

APP_VERSIONS["fzf"]="0.65.2"
APP_URLS["fzf"]="https://github.com/junegunn/fzf/releases/download/v${APP_VERSIONS[fzf]}/fzf-${APP_VERSIONS[fzf]}-linux_amd64.tar.gz"
APP_EXECUTABLE_NAME["fzf"]="fzf"

APP_VERSIONS["yazi"]="25.5.31"
APP_URLS["yazi"]="https://github.com/sxyazi/yazi/releases/download/v${APP_VERSIONS[yazi]}/yazi-x86_64-unknown-linux-musl.zip"
APP_EXECUTABLE_NAME["yazi"]="yazi"

APP_VERSIONS["fd"]="10.3.0"
APP_URLS["fd"]="https://github.com/sharkdp/fd/releases/download/v${APP_VERSIONS[fd]}/fd-v${APP_VERSIONS[fd]}-aarch64-unknown-linux-musl.tar.gz"
APP_EXECUTABLE_NAME["fd"]="fd"

APP_VERSIONS["autojump"]="22.5.3"
APP_URLS["autojump"]="https://github.com/wting/autojump/archive/refs/tags/release-v${APP_VERSIONS[autojump]}.zip"
APP_EXECUTABLE_NAME["autojump"]="special"