name: CI (CentOS 7.7.1908)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  pack-and-build:
    name: Pack and Build All
    runs-on: ubuntu-latest
    container: centos:7.7.1908
    timeout-minutes: 360
    steps:
      - name: Prepare CentOS 7 EOL Environment and Install Dependencies
        run: |
          # Step 1: Point to the CentOS 7 vault repositories as it's EOL.
          cat <<'EOF' > /etc/yum.repos.d/CentOS-Base.repo
          [base]
          name=CentOS-$releasever - Base
          baseurl=http://vault.centos.org/7.9.2009/os/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          [updates]
          name=CentOS-$releasever - Updates
          baseurl=http://vault.centos.org/7.9.2009/updates/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          [extras]
          name=CentOS-$releasever - Extras
          baseurl=http://vault.centos.org/7.9.2009/extras/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          EOF
          sed -i 's/mirror.centos.org/vault.centos.org/g' /etc/yum.repos.d/*.repo
          sed -i 's/mirrorlist.centos.org/vault.centos.org/g' /etc/yum.repos.d/*.repo
          yum clean all
          yum -y makecache
          yum -y groupinstall "Development Tools"
          yum -y install git which findutils coreutils wget tar make gcc gcc-c++ unzip cpio yum-utils environment-modules xz bzip2 python3 rpm2cpio

      - name: Manual Checkout
        # The actions/checkout@v3+ uses Node.js 20, which is incompatible with CentOS 7's old GLIBC.
        # We are replacing it with a manual git clone to avoid this dependency.
        run: |
          set -euxo pipefail
          export OMW_NO_SPINNER=1
          # Clone the repository into the current workspace directory (.).
          # This uses the GITHUB_TOKEN for authentication, which works for both public and private repositories.
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" .

          # Check out the specific commit that triggered the workflow.
          # The ${{ github.sha }} context variable provides the correct commit SHA for both 'push' and 'pull_request' events.
          git checkout "${{ github.sha }}"

      - name: Pack offline bundle
        shell: bash
        run: |
          source /etc/profile.d/modules.sh
          chmod +x ./omw
          ./omw --pack
          ls -la $HOME
          mv $HOME/omw-offline-bundle-*.tar.gz $HOME/omw-offline-bundle-test.tar.gz

      - name: Build everything from offline bundle
        shell: bash
        run: |
          source /etc/profile.d/modules.sh
          export OMW_NO_SPINNER=1
          # Move the bundle to the parent directory to simulate a real offline scenario
          cd $HOME
          # Clean the original source directory
          rm -rf oh-my-workspace
          # Extract and build
          if [ ! -f "$HOME/omw-offline-bundle-test.tar.gz" ]; then
            echo "Error: Offline bundle file not found!"
            exit 1
          fi
          mkdir oh-my-workspace
          cd oh-my-workspace
          tar -xzf $HOME/omw-offline-bundle-test.tar.gz
          chmod +x ./omw
          ./omw --all