name: CI (CentOS 7.7.1908)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  pack:
    name: Pack (offline bundle)
    runs-on: ubuntu-latest
    container: centos:7.7.1908
    steps:
      - name: Prepare CentOS 7 EOL Environment and Install Dependencies
        run: |
          set -euo pipefail
          # Step 1: Overwrite the main CentOS repo file with a specific EOL configuration.
          # This points directly to the CentOS 7.9.2009 vault.
          cat <<'EOF' > /etc/yum.repos.d/CentOS-Base.repo
          [base]
          name=CentOS-$releasever - Base
          baseurl=http://vault.centos.org/7.9.2009/os/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          
          [updates]
          name=CentOS-$releasever - Updates
          baseurl=http://vault.centos.org/7.9.2009/updates/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          
          [extras]
          name=CentOS-$releasever - Extras
          baseurl=http://vault.centos.org/7.9.2009/extras/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          EOF
          
          # Step 2: Install repo definitions for EPEL and SCL.
          # These will add new .repo files that are still broken.
          yum -y install epel-release centos-release-scl

          # Step 3: Fix the newly added repo files (EPEL, SCL) by replacing the mirror domain.
          # This command acts as a catch-all for any other repository configurations.
          sed -i 's/mirror.centos.org/vault.centos.org/g' /etc/yum.repos.d/*.repo
          sed -i 's/mirrorlist.centos.org/vault.centos.org/g' /etc/yum.repos.d/*.repo

          # Step 4: Clean yum cache and build a new one from the corrected vault repositories.
          yum clean all
          yum -y makecache

          # Step 5: Now it's safe to install all other dependencies.
          yum -y groupinstall "Development Tools"
          yum -y install git which findutils coreutils wget tar make gcc gcc-c++ unzip cpio yum-utils environment-modules xz bzip2 python3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache packages
        uses: actions/cache@v4
        with:
          path: |
            packages
          key: centos77-pack-${{ hashFiles('software.conf') }}

      - name: Pack offline bundle
        shell: bash
        run: |
          set -euo pipefail
          # Source environment modules script if it exists.
          source /etc/profile.d/modules.sh || true
          chmod +x ./omw
          ./omw --pack

      - name: Upload offline bundle and packages
        uses: actions/upload-artifact@v4
        with:
          name: omw-offline-bundle
          path: |
            $HOME/omw-offline-bundle-*.tar.gz
            packages/SHA256SUMS
            packages/**

  build-all:
    name: Build all software
    runs-on: ubuntu-latest
    needs: pack
    container: centos:7.7.1908
    timeout-minutes: 360
    steps:
      - name: Prepare CentOS 7 EOL Environment and Install Dependencies
        run: |
          set -euo pipefail
          # Step 1: Overwrite the main CentOS repo file with a specific EOL configuration.
          cat <<'EOF' > /etc/yum.repos.d/CentOS-Base.repo
          [base]
          name=CentOS-$releasever - Base
          baseurl=http://vault.centos.org/7.9.2009/os/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          
          [updates]
          name=CentOS-$releasever - Updates
          baseurl=http://vault.centos.org/7.9.2009/updates/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          
          [extras]
          name=CentOS-$releasever - Extras
          baseurl=http://vault.centos.org/7.9.2009/extras/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          EOF

          # Step 2: Install repo definitions for EPEL and SCL.
          yum -y install epel-release centos-release-scl

          # Step 3: Fix the newly added repo files (EPEL, SCL).
          sed -i 's/mirror.centos.org/vault.centos.org/g' /etc/yum.repos.d/*.repo
          sed -i 's/mirrorlist.centos.org/vault.centos.org/g' /etc/yum.repos.d/*.repo

          # Step 4: Clean and rebuild cache.
          yum clean all
          yum -y makecache

          # Step 5: Install build dependencies, including devtoolset-11 from the now-working SCL repo.
          yum -y groupinstall "Development Tools"
          yum -y install devtoolset-11 git which findutils coreutils wget tar make gcc gcc-c++ unzip cpio rpm2cpio yum-utils environment-modules xz bzip2 python3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore packages cache
        uses: actions/cache@v4
        with:
          path: |
            packages
          key: centos77-pack-${{ hashFiles('software.conf') }}

      - name: Build everything
        shell: bash
        run: |
          set -euo pipefail
          # Source environment modules script.
          source /etc/profile.d/modules.sh || true
          # Enable the modern GCC toolchain from SCL. This is crucial.
          source /opt/rh/devtoolset-11/enable || true
          chmod +x ./omw
          ./omw --all

      - name: Upload build artifacts (logs, modulefiles, bin)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omw-build-artifacts
          path: |
            builds/*/logs/**
            tools/modulefiles/**
            bin/**