name: CI (CentOS 7.7.1908)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  _prepare:
    runs-on: ubuntu-latest
    outputs:
      prepare-step: ${{ toJSON(steps.prepare) }}
    steps:
      - id: prepare
        name: Prepare CentOS 7 EOL Environment and Install Dependencies
        run: |
          set -euo pipefail
          # Step 1: Since CentOS 7 is End-of-Life (EOL), its standard repositories are offline.
          # We must overwrite the main repo file to point to the official vault (archive) server.
          cat <<'EOF' > /etc/yum.repos.d/CentOS-Base.repo
          [base]
          name=CentOS-$releasever - Base
          baseurl=http://vault.centos.org/7.9.2009/os/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7

          [updates]
          name=CentOS-$releasever - Updates
          baseurl=http://vault.centos.org/7.9.2009/updates/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7

          [extras]
          name=CentOS-$releasever - Extras
          baseurl=http://vault.centos.org/7.9.2009/extras/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          EOF

          # Step 2: Fix other repository files (like EPEL, SCL) by replacing the defunct mirror domains
          # with the vault domain. This is a catch-all for any other .repo files.
          sed -i 's/mirror.centos.org/vault.centos.org/g' /etc/yum.repos.d/*.repo
          sed -i 's/mirrorlist.centos.org/vault.centos.org/g' /etc/yum.repos.d/*.repo

          # Step 3: Clean the yum cache and build a new one from the corrected vault repositories.
          yum clean all
          yum -y makecache

          # Step 4: Now it's safe to install all necessary dependencies.
          # 'Development Tools' provides a base set of compilers and build tools.
          # 'devtoolset-11' provides a modern GCC 11 compiler via Software Collections (SCL).
          yum -y groupinstall "Development Tools"
          yum -y install devtoolset-11 git which findutils coreutils wget tar make gcc gcc-c++ unzip cpio rpm2cpio yum-utils environment-modules xz bzip2 python3

  pack:
    name: Pack (offline bundle)
    runs-on: ubuntu-latest
    needs: _prepare
    container: centos:7.7.1908
    steps:
      - name: ${{ fromJSON(needs._prepare.outputs.prepare-step).name }}
        run: ${{ fromJSON(needs._prepare.outputs.prepare-step).run }}

      - name: Checkout
        uses: actions/checkout@v2

      - name: Cache packages
        uses: actions/cache@v2
        with:
          path: |
            packages
          key: centos77-pack-${{ hashFiles('software.conf') }}

      - name: Pack offline bundle
        shell: bash
        run: |
          set -euo pipefail
          # Source the environment modules script to make the 'module' command available.
          source /etc/profile.d/modules.sh || true
          chmod +x ./omw
          ./omw --pack

      - name: Upload offline bundle and packages
        uses: actions/upload-artifact@v2
        with:
          name: omw-offline-bundle
          path: |
            $HOME/omw-offline-bundle-*.tar.gz
            packages/SHA256SUMS
            packages/**

  build-all:
    name: Build all software
    runs-on: ubuntu-latest
    needs: [pack, _prepare]
    container: centos:7.7.1908
    timeout-minutes: 360
    steps:
      - name: ${{ fromJSON(needs._prepare.outputs.prepare-step).name }}
        run: ${{ fromJSON(needs._prepare.outputs.prepare-step).run }}

      - name: Checkout
        uses: actions/checkout@v2

      - name: Restore packages cache
        uses: actions/cache@v2
        with:
          path: |
            packages
          key: centos77-pack-${{ hashFiles('software.conf') }}

      - name: Build everything
        shell: bash
        run: |
          set -euo pipefail
          # Source the environment modules script.
          source /etc/profile.d/modules.sh || true
          # CRITICAL STEP: Enable the modern GCC toolchain from SCL. This command
          # modifies the current shell's PATH to prioritize the GCC 11 compiler.
          source /opt/rh/devtoolset-11/enable || true
          chmod +x ./omw
          ./omw --all

      - name: Upload build artifacts (logs, modulefiles, bin)
        # The 'if: always()' condition ensures this step runs even if the 'Build everything'
        # step fails. This is crucial for capturing logs for debugging purposes.
        if: always()
        # CRITICAL FIX: Use v2 for GLIBC compatibility.
        uses: actions/upload-artifact@v2
        with:
          name: omw-build-artifacts
          path: |
            builds/*/logs/**
            tools/modulefiles/**
            bin/**